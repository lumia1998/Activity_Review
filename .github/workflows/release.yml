name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify frontend dist
        shell: bash
        run: test -f dist/index.html

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pywebview uvicorn fastapi pydantic httptools websockets mss pillow anyio sniffio h11 pystray pythonnet

      - name: Convert icon PNG → ICO
        shell: python
        run: |
          from PIL import Image
          import struct, zlib, io, os

          src = "public/icon.png"
          dst = "public/icon.ico"
          if not os.path.exists(dst):
              img = Image.open(src).convert("RGBA")
              sizes = [16, 32,48, 64, 128, 256]
              images = []
              for s in sizes:
                  images.append(img.resize((s, s), Image.LANCZOS))
              images[0].save(dst, format="ICO", sizes=[(s, s) for s in sizes], append_images=images[1:])
              print(f"Created {dst}")
          else:
              print(f"Skipped, {dst} exists")

      - name: Package with PyInstaller
        run: python -m PyInstaller --clean --noconfirm --distpath build_output --workpath build_temp activity_review.spec

      - name: Verify EXE
        shell: bash
        run: test -f build_output/ActivityReview/ActivityReview.exe

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output/*.exe
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          if [[ -z "$BODY" ]]; then
            BODY="版本 ${VERSION}"
          fi
          printf '%s\n' "$BODY" > release_notes.md

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "Activity Review ${{ github.ref_name }}"
          bodyFile: release_notes.md
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "release-assets/*.exe"
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          makeLatest: true
