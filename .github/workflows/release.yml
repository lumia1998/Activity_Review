name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop-assets:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -e .

      - name: Run frontend tests
        run: node --test

      - name: Build application
        run: npm run build

      - name: Verify frontend dist
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html

      - name: Package desktop source bundle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
from pathlib import Path
import shutil
import zipfile

root = Path.cwd()
out_dir = root / 'release-bundle'
out_dir.mkdir(exist_ok=True)
archive = out_dir / f"activity-review-{root.joinpath('package.json').read_text(encoding='utf-8').split('"version": "')[1].split('"')[0]}-{Path('${{ matrix.platform }}')}.zip"

include_paths = [
    'backend',
    'desktop',
    'dist',
    'src',
    'docs',
    'pyproject.toml',
    'package.json',
    'README.md',
    'README.en.md',
    'README.tw.md',
]

with zipfile.ZipFile(archive, 'w', zipfile.ZIP_DEFLATED) as zf:
    for item in include_paths:
        path = root / item
        if not path.exists():
            continue
        if path.is_file():
            zf.write(path, path.relative_to(root))
            continue
        for child in path.rglob('*'):
            if child.is_file():
                zf.write(child, child.relative_to(root))
PY

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}-${{ strategy.job-index }}
          path: release-bundle/*.zip
          if-no-files-found: error

  publish-release:
    needs: build-desktop-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: "release-assets-*"
          merge-multiple: true

      - name: Extract changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          if [[ -z "$BODY" ]]; then
            BODY="版本 ${VERSION} 更新"
          fi

          printf '%s\n' "$BODY" > release_notes.md

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "Activity_Review ${{ github.ref_name }}"
          bodyFile: release_notes.md
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "all-artifacts/**/*.zip"
          artifactErrorsFailBuild: false
          replacesArtifacts: true
          makeLatest: legacy
